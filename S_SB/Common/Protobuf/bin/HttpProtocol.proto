syntax = "proto3";
package Protocol;

import "google/protobuf/timestamp.proto";
import "Enum.proto";
import "Struct.proto";

option csharp_namespace = "Google.Protobuf.HttpProtocol";

///////////////
// 익명 요청 //
///////////////

message REQ_CHECK_EXISTS_ACCOUNT
{
	string account_name = 1;
}

message RES_CHECK_EXISTS_ACCOUNT
{
	bool success = 1;
}

message REQ_CREATE_ACCOUNT
{
	string account_name = 1;
	string password = 2;
}

message RES_CREATE_ACCOUNT
{
	bool success = 1;
}

message REQ_LOGIN_ACCOUNT
{
	string account_name = 1;
	string password = 2;
}

message REQ_LOGIN_GOOGLE_ACCOUNT
{
	string auth_code = 1;
}

message RES_LOGIN_ACCOUNT
{
	bool success = 1;
	int32 account_id = 2;
	string token_value = 3;
	repeated ServerSelectInfo server_list = 4;
}

///////////////
// 토큰 요구 //
///////////////

message REQ_CONNECT_GAME_SERVER
{
	int32 account_id = 1;
	int32 server_id = 2;
}

message RES_CONNECT_GAME_SERVER
{
	bool success = 1;
	ServerInfo server_info = 2;
}

message REQ_RECHECK_SERVER
{
	int32 account_id = 1;
}

message RES_RECHECK_SERVER
{
	bool success = 1;
	repeated ServerSelectInfo server_list = 2;
}
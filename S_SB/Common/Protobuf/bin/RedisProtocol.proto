syntax = "proto3";
package Protocol;

import "google/protobuf/timestamp.proto";
import "Enum.proto";
import "Struct.proto";

option csharp_namespace = "Google.Protobuf.RedisProtocol";

////////////
// 테스트 //
////////////

message R_TOKEN_DATA
{
	int32 account_db_id = 1;
	int32 token_value = 2;
}

message R_SERVER_DATA
{
	string name = 1;
	string ip_address = 2;
	string port = 3;
	int32 density = 4;
}
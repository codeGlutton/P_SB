syntax = "proto3";
package Protocol;

import "google/protobuf/timestamp.proto";
import "Enum.proto";
import "Struct.proto";

option csharp_namespace = "Google.Protobuf.RedisProtocol";

////////////
// 로그인 //
////////////

// 로그인 데이터
// Structure: String TTL
message R_ACCOUNT_DATA
{
	int32 account_id = 1;
	repeated ObjectInfo object_infos = 2;
}

// 실시간 운영중인 게임 서버 데이터
// Structure: Hashset
message R_SERVER_DATA
{
	uint32 id = 1;
	string name = 2;
	string ip_address = 3;
	string port = 4;
	float density = 5;
}
syntax = "proto3";
package Protocol;

import "google/protobuf/timestamp.proto";

option csharp_namespace = "Google.Protobuf.Enum";

enum ObjectType
{
	OBJECT_TYPE_NONE = 0;
	OBJECT_TYPE_ENV = 1;
	OBJECT_TYPE_BALL = 2;
	OBJECT_TYPE_ATHLETE = 3;
	OBJECT_TYPE_PLAYER = 4;
}

enum RoomType
{
	ROOM_TYPE_NONE = 0;
	ROOM_TYPE_LOBBY = 1;
	ROOM_TYPE_MEETING = 2;
	ROOM_TYPE_TEAMMATCH = 3;
}

enum AthleteRace
{
	ATHLETE_RACE_NONE = 0;
	ATHLETE_RACE_HUMAN = 1;
	ATHLETE_RACE_SLIME = 2;
	ATHLETE_RACE_GEARON = 3;
	ATHLETE_RACE_ROO = 4;
}

// 선수 메인 포지션 정보
enum AthletePosition
{
	ATHLETE_POSITION_NONE = 0;
	ATHLETE_POSITION_FORWARD = 1;
	ATHLETE_POSITION_GUARD = 2;
	ATHLETE_POSITION_CENTER = 3;
}

// 선수의 성장에 영향을 주는 속성
enum AthleteTag
{
	ATHLETE_TAG_NONE = 0;
}


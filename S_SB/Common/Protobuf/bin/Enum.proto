// 실시간 상태 //
/////////////////

enum EmotionState
{
	EMOTION_STATE_NONE = 0;
	EMOTION_STATE_NORMAL = 1;
	EMOTION_STATE_CONFIDENT = 2;
	EMOTION_STATE_ANGRY = 3;
	EMOTION_STATE_INSECURE = 4;
	EMOTION_STATE_RUSHED = 5;
	EMOTION_STATE_HURT = 6;
}

enum InjuryType
{
	INJURY_TYPE_NONE = 0;
	INJURY_TYPE_SPRAIN = 1;
	INJURY_TYPE_TEAR = 2;
	INJURY_TYPE_FRACTURE = 3;
}

enum Bodypart
{
	BODYPART_NONE = 0;

	// 영구적 스피드 혹은 점프력 저하 가능성

	BODYPART_ANKLE = 1;
	BODYPART_LEG = 2;
	BODYPART_KNEE = 3;

	// 영구적 리바운드 저하 가능성

	BODYPART_BACK = 4;

	// 영구적 능력 저하 가능성 없음

	BODYPART_HAND = 5;
}

enum MoveState
{
	// 공용 State

	MOVE_STATE_NONE = 0;
	MOVE_STATE_IDLE = 1;
	MOVE_STATE_WALK = 2;

	// 액터 State

	MOVE_STATE_PHYSICS = 3;

	// 유저 State

	MOVE_STATE_FOLLOW_PATH = 4;

	// 선수 State

	MOVE_STATE_RUN = 5;
	MOVE_STATE_JUMP = 6;
	MOVE_STATE_STEAL = 7;
	MOVE_STATE_HIT = 8;
	MOVE_STATE_HURT = 9;
}

enum TeamState
{
	TEAM_STATE_NONE = 0;
	TEAM_STATE_OFFENSE = 1;
	TEAM_STATE_DEFENSE = 2;
	TEAM_STATE_LOOSE_BALL = 3;
	TEAM_STATE_BREAK = 4;
	TEAM_STATE_END = 5;
}

